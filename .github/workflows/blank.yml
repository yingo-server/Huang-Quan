name: 生成黄泉 TTS 语音 (GPT-SoVITS)2

on:
  workflow_dispatch:
    inputs:
      text:
        description: '要合成的台词文本'
        required: true
        default: '败者成灰，胜者为王'
        type: string

jobs:
  # ============================================================
  # Job 1: 准备环境与模型 (负责下载和缓存所有依赖)
  # ============================================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      GPT_MODEL_PATH: ${{ steps.set-paths.outputs.GPT_MODEL_PATH }}
      SOVITS_MODEL_PATH: ${{ steps.set-paths.outputs.SOVITS_MODEL_PATH }}
      REF_AUDIO_PATH: ${{ steps.set-paths.outputs.REF_AUDIO_PATH }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y ffmpeg git

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # --- 缓存 pip 包 ---
      - name: 缓存 pip 包
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-cache-${{ runner.os }}-v1

      - name: 克隆 GPT-SoVITS 仓库并安装依赖
        run: |
          git clone --depth=1 https://github.com/RVC-Boss/GPT-SoVITS.git
          cd GPT-SoVITS
          # 安装 CPU 版本的 PyTorch
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      # --- 缓存 GPT 模型 (.ckpt) ---
      - name: 缓存 GPT 模型
        id: cache-gpt
        uses: actions/cache@v4
        with:
          path: ./GPT-SoVITS/huangquan-e10.ckpt
          key: huangquan-gpt-v1

      - name: 下载 GPT 模型 (若缓存未命中)
        if: steps.cache-gpt.outputs.cache-hit != 'true'
        run: |
          wget -q --show-progress -O ./GPT-SoVITS/huangquan-e10.ckpt \
            https://github.com/yingo-server/Huang-Quan/releases/download/Source/huangquan-e10.ckpt

      # --- 缓存 SoVITS 模型 (.pth) ---
      - name: 缓存 SoVITS 模型
        id: cache-sovits
        uses: actions/cache@v4
        with:
          path: ./GPT-SoVITS/huangquan_e10_s170.pth
          key: huangquan-sovits-v1

      - name: 下载 SoVITS 模型 (若缓存未命中)
        if: steps.cache-sovits.outputs.cache-hit != 'true'
        run: |
          wget -q --show-progress -O ./GPT-SoVITS/huangquan_e10_s170.pth \
            https://github.com/yingo-server/Huang-Quan/releases/download/Source/huangquan_e10_s170.pth

      # --- 准备参考音频 (使用模型自带的参考音频) ---
      # GPT-SoVITS 需要参考音频来提取音色，这里使用一个占位音频
      # 注意：如果你有黄泉的参考音频，可以替换下面的 URL
      - name: 下载参考音频
        run: |
          wget -q -O ./GPT-SoVITS/reference.wav \
            https://github.com/RVC-Boss/GPT-SoVITS/raw/main/refs/example.wav

      # --- 设置输出路径 ---
      - name: 设置模型路径
        id: set-paths
        run: |
          echo "GPT_MODEL_PATH=$(pwd)/GPT-SoVITS/huangquan-e10.ckpt" >> $GITHUB_OUTPUT
          echo "SOVITS_MODEL_PATH=$(pwd)/GPT-SoVITS/huangquan_e10_s170.pth" >> $GITHUB_OUTPUT
          echo "REF_AUDIO_PATH=$(pwd)/GPT-SoVITS/reference.wav" >> $GITHUB_OUTPUT

  # ============================================================
  # Job 2: 运行 TTS 推理 (依赖 Job 1 的缓存)
  # ============================================================
  tts:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y ffmpeg git

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # --- 恢复 pip 缓存 ---
      - name: 恢复 pip 包缓存
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-cache-${{ runner.os }}-v1

      - name: 克隆 GPT-SoVITS 仓库并安装依赖
        run: |
          git clone --depth=1 https://github.com/RVC-Boss/GPT-SoVITS.git
          cd GPT-SoVITS
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      # --- 恢复模型缓存 ---
      - name: 恢复 GPT 模型缓存
        uses: actions/cache@v4
        with:
          path: ./GPT-SoVITS/huangquan-e10.ckpt
          key: huangquan-gpt-v1

      - name: 恢复 SoVITS 模型缓存
        uses: actions/cache@v4
        with:
          path: ./GPT-SoVITS/huangquan_e10_s170.pth
          key: huangquan-sovits-v1

      - name: 恢复参考音频
        run: |
          wget -q -O ./GPT-SoVITS/reference.wav \
            https://github.com/RVC-Boss/GPT-SoVITS/raw/main/refs/example.wav

      # --- 启动 API 并合成语音 ---
      - name: 启动 API 服务并合成语音
        env:
          TEXT: ${{ inputs.text }}
        run: |
          cd GPT-SoVITS
          # 后台启动 API 服务 (CPU 模式)
          # -dr: 参考音频, -dt: 参考文本, -dl: 参考语种
          python api.py \
            -s ./huangquan_e10_s170.pth \
            -g ./huangquan-e10.ckpt \
            -dr ./reference.wav \
            -dt "这是一个参考音频" \
            -dl "zh" \
            -d cpu \
            -p 9880 &

          # 等待服务启动
          echo "等待 API 服务启动..."
          for i in {1..60}; do
            if curl -s http://127.0.0.1:9880/ > /dev/null; then
              echo "API 服务已就绪"
              break
            fi
            sleep 1
          done

          # 调用 API 合成语音 (使用官方 / 端点)
          curl -X GET "http://127.0.0.1:9880/?text=$TEXT&text_language=zh" \
            --output ../output.wav

          # 停止 API 服务
          pkill -f "api.py" || true

      # --- 转码为 MP3 ---
      - name: 转码为 MP3
        run: |
          if [ ! -f ./output.wav ] || [ ! -s ./output.wav ]; then
            echo "错误：合成未生成有效的输出文件" && exit 1
          fi
          ffmpeg -i ./output.wav -codec:a libmp3lame -q:a 2 ./output.mp3 -y

      # --- 上传音频文件作为 artifact ---
      - name: 上传音频文件 (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: generated-voice
          path: ./output.mp3

  # ============================================================
  # Job 3: 发布 Release (独立运行)
  # ============================================================
  release:
    runs-on: ubuntu-latest
    needs: tts
    permissions:
      contents: write
    steps:
      - name: 下载音频文件 (Artifact)
        uses: actions/download-artifact@v4
        with:
          name: generated-voice
          path: ./

      - name: 生成版本号
        env:
          TEXT: ${{ inputs.text }}
        run: |
          TIMESTAMP=$(date +"%Y%m%d%H%M%S")
          TEXT_SUFFIX=$(echo "$TEXT" | tr -cd '[:alnum:]_-' | head -c 16)
          [ -z "$TEXT_SUFFIX" ] && TEXT_SUFFIX="voice"
          echo "VERSION=[BOT][$TIMESTAMP][$TEXT]" >> $GITHUB_ENV
          echo "TAG=tts-output-$TIMESTAMP-$TEXT_SUFFIX" >> $GITHUB_ENV

      - name: 创建 Release
        env:
          TAG: ${{ env.TAG }}
          VERSION: ${{ env.VERSION }}
          TEXT: ${{ inputs.text }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > notes.txt << 'EOF'
          自动生成于 $(date '+%Y-%m-%d %H:%M:%S')
          文字：$TEXT
          模型：黄泉 (GPT-SoVITS)
          引擎：GPT-SoVITS (CPU)
          EOF
          envsubst < notes.txt > notes_expanded.txt
          gh release create "$TAG" \
            ./output.mp3 \
            --title "$VERSION" \
            --notes-file notes_expanded.txt \
            --target ${{ github.sha }}
